<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | ShopEase</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">

        <div class="container">

            <a class="navbar-brand fw-bold" href="index.html">

                <i class="fa-solid fa-cart-shopping"></i>

                ShopEase

            </a>

            <button class="navbar-toggler"
                data-bs-toggle="collapse"
                data-bs-target="#menu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav mx-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="products.html">Products</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="category.html">Categories</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="about.html">About</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contact</a>
                    </li>

                </ul>

                <div>

                    <a href="search.html"
                        class="btn btn-light me-2">

                        <i class="fa fa-search"></i>

                    </a>

                    <a href="cart.html"
                        class="btn btn-warning position-relative">

                        <i class="fa-solid fa-cart-shopping"></i>

                        <span
                            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                            id="cart-count">

                            0

                        </span>

                    </a>

                </div>

            </div>

        </div>

    </nav>

    <!-- ================= PAGE TITLE ================= -->

    <section class="page-banner">

        <div class="container">

            <h1>All Products</h1>

            <p>
                Browse our latest collections
            </p>

        </div>

    </section>

    <!-- ================= FILTER SECTION ================= -->

    <section class="container py-5">

        <div class="row">

            <!-- Sidebar -->

            <div class="col-lg-3">

                <div class="shadow-box p-4 rounded-box mb-4">

                    <h4 class="mb-4">

                        Filters

                    </h4>

                    <!-- Search -->

                    <div class="mb-4">

                        <label class="form-label">

                            Search Product

                        </label>

                        <input
                            type="text"
                            id="searchInput"
                            class="form-control"
                            placeholder="Search...">

                    </div>

                    <!-- Category -->

                    <div class="mb-4">

                        <label class="form-label">

                            Category

                        </label>

                        <select
                            id="categoryFilter"
                            class="form-select">

                            <option value="all">

                                All Categories

                            </option>

                            <option value="electronics">

                                Electronics

                            </option>

                            <option value="jewelery">

                                Jewellery

                            </option>

                            <option value="men's clothing">

                                Men's Clothing

                            </option>

                            <option value="women's clothing">

                                Women's Clothing

                            </option>

                        </select>

                    </div>

                    <!-- Price -->

                    <div class="mb-4">

                        <label class="form-label">

                            Maximum Price

                        </label>

                        <input
                            type="range"
                            min="0"
                            max="1000"
                            value="1000"
                            class="form-range"
                            id="priceRange">

                        <h5>

                            $<span id="priceValue">

                                1000

                            </span>

                        </h5>

                    </div>

                    <!-- Sort -->

                    <div class="mb-4">

                        <label class="form-label">

                            Sort By

                        </label>

                        <select
                            class="form-select"
                            id="sortProducts">

                            <option value="default">

                                Default

                            </option>

                            <option value="low">

                                Price Low to High

                            </option>

                            <option value="high">

                                Price High to Low

                            </option>

                            <option value="name">

                                Name A-Z

                            </option>

                        </select>

                    </div>

                    <button
                        class="btn btn-warning w-100"
                        id="applyFilters">

                        Apply Filters

                    </button>

                </div>

            </div>

            <!-- Products Grid -->

            <div class="col-lg-9">

                <div class="row"
                    id="productsContainer">

                    <!-- Products will load here using products.js -->

                </div>
                                <!-- Pagination -->

                <div class="row mt-4">

                    <div class="col-12">

                        <nav>

                            <ul class="pagination justify-content-center">

                                <li class="page-item disabled">

                                    <a class="page-link" href="#">

                                        Previous

                                    </a>

                                </li>

                                <li class="page-item active">

                                    <a class="page-link" href="#">

                                        1

                                    </a>

                                </li>

                                <li class="page-item">

                                    <a class="page-link" href="#">

                                        2

                                    </a>

                                </li>

                                <li class="page-item">

                                    <a class="page-link" href="#">

                                        3

                                    </a>

                                </li>

                                <li class="page-item">

                                    <a class="page-link" href="#">

                                        Next

                                    </a>

                                </li>

                            </ul>

                        </nav>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <!-- Footer -->

    <footer class="bg-dark text-white py-4">

        <div class="container">

            <div class="row">

                <div class="col-md-4">

                    <h4>ShopEase</h4>

                    <p>Your Favourite Online Store.</p>

                </div>

                <div class="col-md-4">

                    <h4>Quick Links</h4>

                    <p><a href="index.html">Home</a></p>

                    <p><a href="about.html">About</a></p>

                    <p><a href="contact.html">Contact</a></p>

                </div>

                <div class="col-md-4">

                    <h4>Follow Us</h4>

                    <i class="fab fa-facebook fa-2x me-3"></i>
                    <i class="fab fa-instagram fa-2x me-3"></i>
                    <i class="fab fa-twitter fa-2x"></i>

                </div>

            </div>

            <hr>

            <p class="text-center mb-0">

                © 2026 ShopEase. All Rights Reserved.

            </p>

        </div>

    </footer>

    <!-- Scroll To Top -->

    <button
        id="scrollBtn"
        class="btn btn-warning">

        <i class="fa fa-arrow-up"></i>

    </button>

    <!-- Bootstrap -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Home JS -->

    <script src="js/app.js"></script>

    <!-- Products JS -->

    <script src="js/products.js"></script>

</body>

</html>
