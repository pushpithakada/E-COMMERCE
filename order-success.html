<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Order Successful | ShopEase</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container">

            <a class="navbar-brand fw-bold" href="index.html">

                <i class="fa-solid fa-cart-shopping"></i>

                ShopEase

            </a>

        </div>

    </nav>

    <!-- Success -->

    <section class="container py-5">

        <div class="text-center shadow-box p-5 rounded-box">

            <i class="fa-solid fa-circle-check text-success"
                style="font-size:90px;"></i>

            <h1 class="mt-4">

                Order Placed Successfully!

            </h1>

            <p class="lead">

                Thank you for shopping with us.

            </p>

            <hr>

            <h4>

                Order Number

            </h4>

            <h2 id="orderNumber">

                Loading...

            </h2>

            <br>

            <h4>

                Status

            </h4>

            <span
                class="badge bg-success fs-5">

                Confirmed

            </span>

            <br><br>

            <div id="customerInfo">

            </div>

            <br>

            <a
                href="products.html"
                class="btn btn-warning btn-lg">

                Continue Shopping

            </a>

        </div>

    </section>

    <!-- Footer -->

    <footer class="bg-dark text-white py-4">

        <div class="container text-center">

            © 2026 ShopEase. All Rights Reserved.

        </div>

    </footer>

    <script>

        const order =
            JSON.parse(localStorage.getItem("latestOrder"));

        if (!order) {

            window.location.href = "index.html";

        }

        document.getElementById("orderNumber").innerText =
            order.orderNumber;

        document.getElementById("customerInfo").innerHTML = `

        <h5>${order.customer}</h5>

        <p>${order.email}</p>

        <p>${order.phone}</p>

        <p>${order.address}, ${order.city}</p>

        <p><strong>Total :</strong> ${order.total}</p>

        `;

    </script>

</body>

</html>
